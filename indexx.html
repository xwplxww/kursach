<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планировщик задач</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styless.css">
</head>
<body>
    <div class="container">
        <h1>
            <span class="material-icons">bolt</span>
            Планировщик задач
        </h1>
        
        <div class="task-form">
            <span class="material-icons">add_circle</span>
            <input type="text" class="task-input" placeholder="Добавить новую задачу..." id="taskInput">
            <button class="add-btn" id="addTaskBtn">Добавить</button>
        </div>
        
        <div class="controls">
            <div class="filter-btns">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="active">Активные</button>
                <button class="filter-btn" data-filter="completed">Завершённые</button>
            </div>
            <button class="clear-btn" id="clearCompleted">
                <span class="material-icons">delete_forever</span>
                Очистить
            </button>
        </div>
        
        <ul class="task-list" id="taskList">
            <div class="empty-state">
                <span class="material-icons">inventory_2</span>
                <p>Пока нет задач</p>
            </div>
        </ul>
        
        <div class="stats">
            Всего: <span class="neon-text" id="totalCount">0</span> | 
            Активных: <span class="neon-text" id="activeCount">0</span> | 
            Завершённых: <span class="neon-text" id="completedCount">0</span>
        </div>
    </div>
        
        <script src="index.js"></script>
</body>
</html>
